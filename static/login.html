<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='14' fill='%231F3A5F'/%3E%3Cpath d='M32 8C19.85 8 10 17.85 10 30C10 42.15 19.85 52 32 52C44.15 52 54 42.15 54 30C54 17.85 44.15 8 32 8Z' stroke='white' stroke-width='3.2' opacity='.92'/%3E%3Cpath d='M32 18L37.8 30L32 42L26.2 30L32 18Z' fill='%232EC4B6' stroke='white' stroke-width='2.4'/%3E%3Cpath d='M23 48L17 56L29 53.6L23 48Z' fill='white' opacity='.92'/%3E%3C/svg%3E">

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập — Magerok AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #1F3A5F;
    --teal: #2EC4B6;
    --teal-dark: #1CA79A;
    --beige: #F3EBDD;
    --beige-2: #FBF8F2;
    --text: #142033;
    --muted: #5F6C7B;
    --error: #E53E3E;
    --line: rgba(20,32,51,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(46,196,182,0.15), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(31,58,95,0.12), transparent 40%),
      linear-gradient(135deg, #f8f5f0 0%, #ffffff 50%, #f0f8f7 100%);
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    position: relative; overflow: hidden;
  }

  /* Decorative blobs */
  body::before {
    content: '';
    position: fixed; top: -100px; right: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(46,196,182,0.12), transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; bottom: -80px; left: -80px;
    width: 350px; height: 350px; border-radius: 50%;
    background: radial-gradient(circle, rgba(31,58,95,0.08), transparent 70%);
    pointer-events: none;
  }

  /* Card */
  .card {
    width: 100%; max-width: 440px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(46,196,182,0.2);
    border-radius: 28px;
    padding: 44px 40px 40px;
    box-shadow: 0 32px 80px rgba(31,58,95,0.12), 0 0 0 1px rgba(255,255,255,0.8) inset;
    position: relative; z-index: 1;
    animation: card-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }

  /* Logo */
  .logo {
    display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
    text-decoration: none;
  }
  .logo-mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--navy), var(--teal));
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-mark svg { width: 20px; height: 20px; }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; font-weight: 700; color: var(--navy);
  }

  /* Heading */
  .heading { margin-bottom: 28px; }
  .heading h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem; color: var(--navy); margin-bottom: 6px; line-height: 1.25;
  }
  .heading p { font-size: 0.9rem; color: var(--muted); font-weight: 300; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; background: rgba(20,32,51,0.05);
    border-radius: 12px; padding: 4px; margin-bottom: 28px;
  }
  .tab {
    flex: 1; padding: 9px; border-radius: 9px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted);
  }
  .tab.active {
    background: #fff; color: var(--navy);
    box-shadow: 0 2px 8px rgba(20,32,51,0.1);
  }

  /* Form */
  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: 0.82rem; font-weight: 500;
    color: var(--navy); margin-bottom: 6px;
  }
  input[type=email], input[type=password], input[type=text] {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--line); border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
    color: var(--text); background: rgba(255,255,255,0.8);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(46,196,182,0.12);
  }
  input::placeholder { color: rgba(95,108,123,0.5); }

  .password-wrap { position: relative; }
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px; line-height: 1;
  }

  .forgot {
    display: block; text-align: right; font-size: 0.8rem;
    color: var(--teal-dark); margin-top: 6px; cursor: pointer;
    text-decoration: none; transition: color 0.2s;
  }
  .forgot:hover { color: var(--navy); }

  /* Submit button */
  .btn-submit {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--navy), #2d5a8e);
    color: #fff; border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; margin-top: 8px; margin-bottom: 20px;
    transition: all 0.2s; position: relative; overflow: hidden;
    box-shadow: 0 8px 24px rgba(31,58,95,0.25);
  }
  .btn-submit:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(31,58,95,0.3);
  }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-submit .spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .btn-submit.loading .btn-text { display: none; }
  .btn-submit.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .divider span { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

  /* Social buttons */
  .btn-social {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.9); border: 1.5px solid var(--line);
    border-radius: 12px; font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500; color: var(--text);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 10px; transition: all 0.2s;
    box-shadow: 0 2px 6px rgba(20,32,51,0.05);
  }
  .btn-social:hover { border-color: var(--teal); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(20,32,51,0.1); }
  .btn-social img { width: 20px; height: 20px; }

  /* Alert */
  .alert {
    padding: 11px 14px; border-radius: 10px;
    font-size: 0.85rem; margin-bottom: 16px; display: none;
    animation: fadein 0.2s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .alert.error { background: rgba(229,62,62,0.08); color: var(--error); border: 1px solid rgba(229,62,62,0.2); }
  .alert.success { background: rgba(46,196,182,0.08); color: var(--teal-dark); border: 1px solid rgba(46,196,182,0.2); }
  .alert.show { display: block; }

  /* Success screen */
  #success-screen {
    display: none; text-align: center;
    animation: card-in 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  .check-circle {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--navy));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 12px 32px rgba(46,196,182,0.3);
  }
  #success-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--navy); margin-bottom: 8px;
  }
  #success-screen p { font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }

  /* Footer link */
  .footer-note {
    text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 16px;
  }
  .footer-note a { color: var(--teal-dark); font-weight: 500; }

  @media (max-width: 480px) {
    .card { padding: 32px 24px 28px; border-radius: 22px; }
    .heading h1 { font-size: 1.45rem; }
  }
</style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 8C19.85 8 10 17.85 10 30C10 42.15 19.85 52 32 52C44.15 52 54 42.15 54 30C54 17.85 44.15 8 32 8Z" stroke="white" stroke-width="3.2" opacity="0.92"/>
        <path d="M32 18L37.8 30L32 42L26.2 30L32 18Z" fill="#2EC4B6" stroke="white" stroke-width="2.4"/>
        <path d="M23 48L17 56L29 53.6L23 48Z" fill="white" opacity="0.92"/>
      </svg>
    </div>
    <span class="logo-text">Magerok</span>
  </a>

  <!-- Auth form -->
  <div id="auth-screen">
    <div class="heading">
      <h1 id="heading-title">Chào mừng trở lại</h1>
      <p id="heading-sub">Đăng nhập để tiếp tục tư vấn cùng AI</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Đăng nhập</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Đăng ký</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert-box"></div>

    <!-- Name field (register only) -->
    <div class="form-group" id="name-group" style="display:none">
      <label for="full-name">Họ và tên</label>
      <input type="text" id="full-name" placeholder="Nguyễn Văn A" autocomplete="name"/>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="email@example.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw()" title="Hiện/ẩn mật khẩu">
          <svg id="pw-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <a class="forgot" id="forgot-link" onclick="forgotPassword()">Quên mật khẩu?</a>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">
      <span class="btn-text" id="submit-text">Đăng nhập</span>
      <div class="spinner"></div>
    </button>

    <!-- Social -->
    <div class="divider"><span>hoặc tiếp tục với</span></div>

    <button class="btn-social" onclick="loginGoogle()">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"/>
      Tiếp tục với Google
    </button>

    <p class="footer-note" id="footer-note">
      Chưa có tài khoản? <a onclick="switchTab('register')" style="cursor:pointer">Đăng ký miễn phí</a>
    </p>
  </div>

  <!-- Success screen -->
  <div id="success-screen">
    <div class="check-circle">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>Đăng ký thành công!</h2>
    <p>Kiểm tra email để xác nhận tài khoản, sau đó đăng nhập.</p>
    <button class="btn-submit" style="max-width:200px;margin:0 auto" onclick="switchTab('login')">
      <span class="btn-text">Đăng nhập ngay</span>
      <div class="spinner"></div>
    </button>
  </div>
</div>

<script>
  // ── Cấu hình Supabase ──────────────────────────────────────────────────────
  // Thay 2 giá trị này bằng Project URL và anon key từ Supabase dashboard
  const SUPABASE_URL  = 'https://gwduxjcxrnlytodandco.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3ZHV4amN4cm5seXRvZGFuZGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MTYwODAsImV4cCI6MjA5NDM5MjA4MH0.hAzwFJa68wFKtfyB9TKHXg-jWXt_4pCHn7gzvYyss7c';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // Redirect nếu đã login
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      window.location.href = '/chat';
    }
  });

  // ── UI helpers ─────────────────────────────────────────────────────────────
  let currentTab = 'login';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('name-group').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('forgot-link').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('submit-text').textContent = tab === 'login' ? 'Đăng nhập' : 'Tạo tài khoản';
    document.getElementById('heading-title').textContent = tab === 'login' ? 'Chào mừng trở lại' : 'Tạo tài khoản';
    document.getElementById('heading-sub').textContent = tab === 'login'
      ? 'Đăng nhập để tiếp tục tư vấn cùng AI'
      : 'Miễn phí. Không cần thẻ tín dụng.';
    document.getElementById('footer-note').innerHTML = tab === 'login'
      ? 'Chưa có tài khoản? <a onclick="switchTab(\'register\')" style="cursor:pointer">Đăng ký miễn phí</a>'
      : 'Đã có tài khoản? <a onclick="switchTab(\'login\')" style="cursor:pointer">Đăng nhập</a>';
    document.getElementById('auth-screen').style.display = 'block';
    document.getElementById('success-screen').style.display = 'none';
    hideAlert();
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert-box');
    el.textContent = msg; el.className = `alert ${type} show`;
  }
  function hideAlert() {
    document.getElementById('alert-box').classList.remove('show');
  }

  function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
  }

  function togglePw() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // ── Auth actions ───────────────────────────────────────────────────────────
  async function handleSubmit() {
    hideAlert();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const name     = document.getElementById('full-name').value.trim();

    if (!email || !password) { showAlert('Vui lòng nhập email và mật khẩu.'); return; }
    if (password.length < 6) { showAlert('Mật khẩu phải có ít nhất 6 ký tự.'); return; }

    setLoading(true);
    try {
      if (currentTab === 'login') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = '/chat';
      } else {
        const { error } = await sb.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });
        if (error) throw error;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
      }
    } catch (err) {
      const msg = {
        'Invalid login credentials': 'Email hoặc mật khẩu không đúng.',
        'Email not confirmed':       'Vui lòng xác nhận email trước khi đăng nhập.',
        'User already registered':   'Email này đã được đăng ký. Hãy đăng nhập.',
      }[err.message] || err.message;
      showAlert(msg);
    } finally {
      setLoading(false);
    }
  }

  async function loginGoogle() {
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/chat' }
    });
  }

  async function forgotPassword() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('Nhập email của bạn rồi nhấn "Quên mật khẩu".'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password'
    });
    if (error) showAlert(error.message);
    else showAlert('Đã gửi link đặt lại mật khẩu. Kiểm tra email nhé!', 'success');
  }

  // Enter to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
