<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Tư Vấn Tuyển Sinh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --accent2: #f6ad55;
    --text: #e2e8f0;
    --text-muted: #718096;
    --user-bubble: linear-gradient(135deg, #2b6cb0, #3182ce);
    --bot-bubble: #1a2236;
    --radius: 18px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; top: -30%; right: -20%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,179,237,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; bottom: -20%; left: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(246,173,85,0.05) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* Header */
  header {
    position: relative; z-index: 10;
    background: rgba(17,24,39,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-ring {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #2b6cb0, #63b3ed);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 20px rgba(99,179,237,0.3); }
    50%      { box-shadow: 0 0 32px rgba(99,179,237,0.5); }
  }
  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 700; line-height: 1.2;
  }
  .header-title p { font-size: 0.72rem; color: var(--text-muted); font-weight: 300; margin-top: 1px; }
  .status-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.72rem; color: #68d391; font-weight: 500;
  }
  .status-dot::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #68d391; animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  .btn-reset {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 7px 14px; border-radius: 8px;
    font-family: 'Be Vietnam Pro', sans-serif; font-size: 0.78rem;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,179,237,0.06); }

  /* Messages */
  #messages {
    position: relative; z-index: 1;
    flex: 1; overflow-y: auto;
    padding: 28px 20px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(99,179,237,0.2); border-radius: 3px; }
  .msg-row { display: flex; align-items: flex-end; gap: 10px; animation: slide-in 0.3s ease-out; }
  @keyframes slide-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .msg-row.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .avatar.bot { background: linear-gradient(135deg, #2b6cb0, #63b3ed); }
  .avatar.user { background: linear-gradient(135deg, #744210, #d97706); }
  .bubble {
    max-width: min(480px, 78%); padding: 13px 18px;
    border-radius: var(--radius); font-size: 0.9rem; line-height: 1.65; word-break: break-word;
  }
  .bubble.bot { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--user-bubble); border-bottom-right-radius: 4px; color: #fff; }
  .bubble time { display: block; font-size: 0.68rem; color: var(--text-muted); margin-top: 6px; text-align: right; }
  .bubble.user time { color: rgba(255,255,255,0.5); }

  /* Image preview inside bubble */
  .bubble img { max-width: 100%; border-radius: 10px; margin-bottom: 8px; display: block; }

  /* Typing */
  .typing-bubble { display: flex; gap: 5px; align-items: center; padding: 14px 20px; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: typing 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100% { transform:translateY(0); opacity:0.4; } 30% { transform:translateY(-6px); opacity:1; } }

  /* Welcome */
  .welcome-block { text-align: center; padding: 20px 0 8px; }
  .welcome-block h2 {
    font-family: 'Playfair Display', serif; font-size: 1.5rem;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px;
  }
  .welcome-block p { font-size: 0.85rem; color: var(--text-muted); }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
  .chip {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
    transition: all 0.2s; font-family: 'Be Vietnam Pro', sans-serif;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,179,237,0.07); transform: translateY(-1px); }

  /* Footer */
  footer {
    position: relative; z-index: 10;
    background: rgba(17,24,39,0.95); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); padding: 12px 20px;
  }

  /* Image preview strip (above input) */
  #img-preview-strip {
    display: none; align-items: center; gap: 10px;
    margin-bottom: 10px; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px;
  }
  #img-preview-strip img { height: 52px; width: 52px; object-fit: cover; border-radius: 8px; }
  #img-preview-strip span { font-size: 0.78rem; color: var(--text-muted); flex: 1; }
  #btn-remove-img {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 6px;
    border-radius: 6px; transition: color 0.2s;
  }
  #btn-remove-img:hover { color: #fc8181; }

  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 10px 10px 16px; transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: rgba(99,179,237,0.4); box-shadow: 0 0 0 3px rgba(99,179,237,0.07); }

  /* Hidden file input */
  #file-input { display: none; }

  /* Image attach button */
  #btn-attach {
    width: 36px; height: 36px; border-radius: 8px;
    background: transparent; border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; color: var(--text-muted);
  }
  #btn-attach:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,179,237,0.06); }
  #btn-attach svg { width: 16px; height: 16px; }

  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 0.9rem; line-height: 1.5; resize: none;
    max-height: 120px; min-height: 22px;
  }
  #user-input::placeholder { color: var(--text-muted); }

  #btn-send {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(49,130,206,0.3);
  }
  #btn-send:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 16px rgba(49,130,206,0.4); }
  #btn-send:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  #btn-send svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .footer-hint { text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; opacity: 0.6; }

  /* Toast */
  #toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #c53030; color: #fff; padding: 10px 20px;
    border-radius: 10px; font-size: 0.82rem;
    opacity: 0; transition: all 0.3s; pointer-events: none;
    z-index: 100; max-width: 90vw; text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    header { padding: 12px 16px; }
    #messages { padding: 20px 12px; }
    footer { padding: 10px 12px; }
    .bubble { max-width: 88%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-ring">🎓</div>
    <div class="header-title">
      <h1>AI Tư Vấn Tuyển Sinh</h1>
      <p>Hỗ trợ thông tin điểm chuẩn & định hướng ngành học</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span class="status-dot">Đang hoạt động</span>
    <button class="btn-reset" onclick="resetSession()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
      Cuộc mới
    </button>
  </div>
</header>

<div id="messages">
  <div class="welcome-block">
    <h2>Xin chào! Tôi có thể giúp gì cho bạn?</h2>
    <p>Hỏi tôi về điểm chuẩn, ngành học hoặc định hướng nghề nghiệp nhé.</p>
    <div class="suggestions">
      <button class="chip" onclick="sendChip(this)">Điểm chuẩn 2024 ngành CNTT?</button>
      <button class="chip" onclick="sendChip(this)">Ngành nào phù hợp với tôi?</button>
      <button class="chip" onclick="sendChip(this)">Trường nào có ngành Y tốt?</button>
      <button class="chip" onclick="sendChip(this)">Điểm chuẩn Bách Khoa HN 2024?</button>
      <button class="chip" onclick="sendChip(this)">Ngành Kinh tế học ở đâu?</button>
    </div>
  </div>
</div>

<footer>
  <!-- Image preview strip -->
  <div id="img-preview-strip">
    <img id="img-thumb" src="" alt="preview" />
    <span id="img-name">Ảnh đính kèm</span>
    <button id="btn-remove-img" onclick="removeImage()" title="Xóa ảnh">×</button>
  </div>

  <div class="input-wrap">
    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)" />
    <button id="btn-attach" onclick="document.getElementById('file-input').click()" title="Đính kèm ảnh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <textarea id="user-input" rows="1" placeholder="Nhập câu hỏi của bạn..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <p class="footer-hint">Enter để gửi · Shift+Enter xuống dòng · 📎 đính kèm ảnh</p>
</footer>

<div id="toast"></div>

<script>
  // Dùng cùng origin với server → không cần hardcode URL
  const API_BASE = window.location.origin;
  const SESSION_ID = 'user_' + Math.random().toString(36).slice(2, 9);

  let pendingImageBase64 = null;
  let pendingImageType = null;

  // ── Image handling ────────────────────────────────────────────────────────

  async function compressImage(file, maxKB = 700) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          // Scale down if too large
          const MAX_DIM = 1024;
          if (w > MAX_DIM || h > MAX_DIM) {
            if (w > h) { h = Math.round(h * MAX_DIM / w); w = MAX_DIM; }
            else        { w = Math.round(w * MAX_DIM / h); h = MAX_DIM; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);

          // Try quality from 0.85 down until under maxKB
          let quality = 0.85;
          let dataUrl;
          do {
            dataUrl = canvas.toDataURL('image/jpeg', quality);
            quality -= 0.1;
          } while (dataUrl.length > maxKB * 1024 * 1.37 && quality > 0.2);

          resolve(dataUrl); // full data URL
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      showToast('⚠️ Ảnh quá lớn! Chọn ảnh dưới 10MB.');
      event.target.value = '';
      return;
    }
    showToast('🔄 Đang nén ảnh...', '#2b6cb0');
    const dataUrl = await compressImage(file);
    const base64 = dataUrl.split(',')[1];
    pendingImageBase64 = base64;
    pendingImageType = 'image/jpeg';

    // Show preview strip
    document.getElementById('img-thumb').src = dataUrl;
    document.getElementById('img-name').textContent = file.name + ' (đã nén)';
    const strip = document.getElementById('img-preview-strip');
    strip.style.display = 'flex';
    showToast('✅ Ảnh sẵn sàng!', '#276749');
    event.target.value = '';
  }

  function removeImage() {
    pendingImageBase64 = null;
    pendingImageType = null;
    document.getElementById('img-preview-strip').style.display = 'none';
    document.getElementById('img-thumb').src = '';
  }

  // ── UI helpers ────────────────────────────────────────────────────────────

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendChip(btn) {
    document.getElementById('user-input').value = btn.textContent;
    sendMessage();
  }

  function now() {
    return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role, imageDataUrl) {
    const box = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + role;
    avatar.textContent = role === 'bot' ? '🎓' : '🙋';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;

    // Show image preview inside user bubble if provided
    if (imageDataUrl && role === 'user') {
      const imgEl = document.createElement('img');
      imgEl.src = imageDataUrl;
      bubble.appendChild(imgEl);
    }

    const content = document.createElement('div');
    content.innerHTML = text.replace(/\n/g, '<br>');
    bubble.appendChild(content);

    const t = document.createElement('time');
    t.textContent = now();
    bubble.appendChild(t);

    row.appendChild(avatar);
    row.appendChild(bubble);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }

  function addTyping() {
    const box = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar bot'; avatar.textContent = '🎓';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot typing-bubble';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    row.appendChild(avatar); row.appendChild(bubble);
    box.appendChild(row); box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  function showToast(msg, bg = '#c53030') {
    const toast = document.getElementById('toast');
    toast.textContent = msg; toast.style.background = bg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── Send message ──────────────────────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text && !pendingImageBase64) return;

    const welcome = document.querySelector('.welcome-block');
    if (welcome) welcome.remove();

    const imgSnapshot = pendingImageBase64
      ? 'data:image/jpeg;base64,' + pendingImageBase64
      : null;

    input.value = ''; input.style.height = 'auto';
    const sendBtn = document.getElementById('btn-send');
    sendBtn.disabled = true;

    addMessage(text || '(Xem ảnh đính kèm)', 'user', imgSnapshot);

    // Clear image
    const payloadImage = pendingImageBase64;
    const payloadType = pendingImageType;
    removeImage();

    addTyping();

    try {
      const body = { session_id: SESSION_ID, cau_hoi: text };
      if (payloadImage) {
        body.image_base64 = payloadImage;
        body.image_type = payloadType;
      }

      const res = await fetch(`${API_BASE}/hoi`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Lỗi ${res.status}`);
      }

      const data = await res.json();
      removeTyping();
      addMessage(data.tra_loi, 'bot');
    } catch (err) {
      removeTyping();
      addMessage('⚠️ Có lỗi xảy ra, vui lòng thử lại.\n\nChi tiết: ' + err.message, 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ── Reset ─────────────────────────────────────────────────────────────────

  async function resetSession() {
    removeImage();
    try {
      await fetch(`${API_BASE}/reset`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID }),
      });
    } catch (_) {}

    document.getElementById('messages').innerHTML = `
      <div class="welcome-block">
        <h2>Cuộc trò chuyện mới!</h2>
        <p>Tôi sẵn sàng tư vấn cho bạn. Hãy đặt câu hỏi nhé.</p>
        <div class="suggestions">
          <button class="chip" onclick="sendChip(this)">Điểm chuẩn 2024 ngành CNTT?</button>
          <button class="chip" onclick="sendChip(this)">Ngành nào phù hợp với tôi?</button>
          <button class="chip" onclick="sendChip(this)">Trường nào có ngành Y tốt?</button>
          <button class="chip" onclick="sendChip(this)">Điểm chuẩn Bách Khoa HN 2024?</button>
        </div>
      </div>`;
    showToast('🔄 Đã tạo cuộc trò chuyện mới', '#276749');
  }
</script>
</body>
</html>
