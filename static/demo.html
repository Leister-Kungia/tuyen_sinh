<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='14' fill='%231F3A5F'/%3E%3Cpath d='M32 8C19.85 8 10 17.85 10 30C10 42.15 19.85 52 32 52C44.15 52 54 42.15 54 30C54 17.85 44.15 8 32 8Z' stroke='white' stroke-width='3.2' opacity='.92'/%3E%3Cpath d='M32 18L37.8 30L32 42L26.2 30L32 18Z' fill='%232EC4B6' stroke='white' stroke-width='2.4'/%3E%3Cpath d='M23 48L17 56L29 53.6L23 48Z' fill='white' opacity='.92'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dùng thử · Magerok AI</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Reset & Tokens ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb-w: 260px;
  --navy: #1F3A5F;
  --teal: #2EC4B6;
  --teal-d: #1CA79A;
  --bg: #F7F5F0;
  --sb-bg: #1a2233;
  --sb-hover: rgba(255,255,255,0.06);
  --sb-active: rgba(46,196,182,0.15);
  --sb-border: rgba(255,255,255,0.07);
  --text: #1a2233;
  --muted: #6b7a8d;
  --line: rgba(26,34,51,0.1);
  --bubble-ai: #ffffff;
  --bubble-user: #1F3A5F;
  --input-bg: #ffffff;
  --radius: 16px;
}

html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* ── Sidebar ─────────────────────────────────────────────────────── */
#sidebar{
  width:var(--sb-w);
  min-width:var(--sb-w);
  height:100vh;
  background:var(--sb-bg);
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--sb-border);
  position:relative;
  z-index:10;
  transition:transform 0.28s cubic-bezier(.4,0,.2,1);
}

.sb-top{
  padding:16px 14px 12px;
  border-bottom:1px solid var(--sb-border);
  display:flex;
  align-items:center;
  gap:10px;
}
.sb-logo{
  display:flex;align-items:center;gap:8px;flex:1;
  color:#fff;font-family:'Lora',serif;font-size:1rem;font-weight:600;
  letter-spacing:-.3px;
}
.sb-logo svg{width:26px;height:26px;flex-shrink:0}

.btn-new{
  display:flex;align-items:center;gap:7px;
  width:100%;padding:10px 12px;margin:12px 14px 0;
  width:calc(100% - 28px);
  background:rgba(46,196,182,0.12);
  border:1px solid rgba(46,196,182,0.25);
  border-radius:10px;color:#fff;
  font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.btn-new:hover{background:rgba(46,196,182,0.2);border-color:rgba(46,196,182,0.4)}
.btn-new svg{width:15px;height:15px;stroke:var(--teal);flex-shrink:0}

.sb-section-label{
  padding:16px 16px 6px;
  font-size:0.68rem;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(255,255,255,0.3);font-weight:500;
}

.sb-list{
  flex:1;overflow-y:auto;padding:0 8px 8px;
}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

.conv-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 10px;border-radius:9px;
  color:rgba(255,255,255,0.65);font-size:0.83rem;
  cursor:pointer;transition:all .15s;
  border:1px solid transparent;
}
.conv-item:hover{background:var(--sb-hover);color:#fff}
.conv-item.active{background:var(--sb-active);color:#fff;border-color:rgba(46,196,182,0.2)}
.conv-item svg{width:14px;height:14px;flex-shrink:0;opacity:.5}
.conv-item.active svg{opacity:.8}
.conv-title{
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.35;
}
.conv-date{font-size:0.68rem;color:rgba(255,255,255,0.3);flex-shrink:0}

.conv-item .del-btn{
  display:none;background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.35);padding:2px;border-radius:4px;
  line-height:1;transition:color .15s;
}
.conv-item:hover .del-btn{display:flex}
.conv-item .del-btn:hover{color:#fc8181}

.sb-footer{
  padding:12px 14px;
  border-top:1px solid var(--sb-border);
  display:flex;align-items:center;gap:10px;
}
.user-avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal-d),var(--navy));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:0.78rem;font-weight:600;flex-shrink:0;
}
.user-info{flex:1;overflow:hidden}
.user-name{
  color:#fff;font-size:0.83rem;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.user-email{
  font-size:0.69rem;color:rgba(255,255,255,0.35);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.btn-logout{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.3);padding:5px;border-radius:6px;
  transition:color .15s;
}
.btn-logout:hover{color:#fc8181}

/* ── Main ────────────────────────────────────────────────────────── */
#main{
  flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;
  background:var(--bg);
}

/* Topbar */
.topbar{
  height:54px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid var(--line);
  background:rgba(247,245,240,0.9);
  backdrop-filter:blur(12px);
  flex-shrink:0;
  gap:12px;
}
.topbar-model{
  display:flex;align-items:center;gap:8px;
  font-size:0.85rem;font-weight:500;color:var(--text);
}
.topbar-dot{
  width:7px;height:7px;border-radius:50%;background:var(--teal);
  box-shadow:0 0 6px var(--teal);animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-mobile-menu{
  display:none;background:none;border:none;cursor:pointer;
  color:var(--muted);padding:6px;
}

/* File indicator */
#file-indicator{
  display:none;
  margin:8px 20px 0;
  padding:8px 12px;
  background:rgba(46,196,182,0.08);
  border:1px solid rgba(46,196,182,0.2);
  border-radius:10px;
  font-size:0.8rem;color:var(--teal-d);
  align-items:center;gap:8px;
  flex-shrink:0;
}
#file-indicator.show{display:flex}
#file-indicator button{
  background:none;border:none;cursor:pointer;
  color:var(--muted);margin-left:auto;padding:2px;
}

/* Messages */
#messages{
  flex:1;overflow-y:auto;
  padding:28px 0;
  display:flex;flex-direction:column;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:5px}
#messages::-webkit-scrollbar-thumb{background:rgba(26,34,51,0.1);border-radius:3px}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;padding:40px 24px;
  animation:fadeUp .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.empty-logo{
  width:60px;height:60px;border-radius:16px;margin-bottom:20px;
  background:linear-gradient(135deg,var(--navy),#2d5a8e);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(31,58,95,.2);
}
.empty-state h2{
  font-family:'Lora',serif;font-size:1.45rem;color:var(--navy);
  margin-bottom:8px;font-weight:600;
}
.empty-state p{font-size:0.88rem;color:var(--muted);max-width:360px;line-height:1.6;margin-bottom:28px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px}
.chip{
  padding:9px 15px;border-radius:20px;
  border:1.5px solid var(--line);background:#fff;
  font-size:0.8rem;color:var(--text);cursor:pointer;
  transition:all .2s;font-family:'DM Sans',sans-serif;
}
.chip:hover{border-color:var(--teal);color:var(--teal-d);transform:translateY(-1px)}

/* Message rows */
.msg-row{
  display:flex;gap:12px;padding:4px 24px;
  max-width:860px;width:100%;margin:0 auto;
  animation:fadeUp .25s ease both;
}
.msg-row.user{flex-direction:row-reverse}

.msg-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.72rem;font-weight:600;margin-top:2px;
}
.msg-avatar.ai{background:linear-gradient(135deg,var(--navy),#2d5a8e)}
.msg-avatar.user{background:linear-gradient(135deg,var(--teal-d),var(--navy));color:#fff}

.msg-bubble{
  max-width:min(580px,80%);
  padding:12px 16px;border-radius:var(--radius);
  font-size:0.9rem;line-height:1.7;word-break:break-word;
}
.msg-bubble.ai{
  background:var(--bubble-ai);
  border:1px solid var(--line);
  border-top-left-radius:4px;
  box-shadow:0 2px 8px rgba(26,34,51,.06);
  color:var(--text);
}
.msg-bubble.user{
  background:var(--bubble-user);
  border-top-right-radius:4px;
  color:#fff;
}
.msg-bubble time{
  display:block;font-size:0.67rem;
  margin-top:6px;opacity:.45;text-align:right;
}

/* Markdown trong bubble AI */
.msg-bubble.ai h1,.msg-bubble.ai h2,.msg-bubble.ai h3{
  font-family:'Lora',serif;color:var(--navy);margin:12px 0 6px;
}
.msg-bubble.ai h1{font-size:1.05rem}
.msg-bubble.ai h2{font-size:.97rem}
.msg-bubble.ai h3{font-size:.9rem}
.msg-bubble.ai p{margin-bottom:8px}
.msg-bubble.ai p:last-child{margin-bottom:0}
.msg-bubble.ai ul,.msg-bubble.ai ol{padding-left:20px;margin-bottom:8px}
.msg-bubble.ai li{margin-bottom:3px}
.msg-bubble.ai strong{color:var(--navy);font-weight:600}
.msg-bubble.ai em{color:var(--muted)}
.msg-bubble.ai code{
  background:rgba(31,58,95,.07);padding:2px 6px;border-radius:4px;
  font-size:.84em;font-family:'Courier New',monospace;color:var(--navy);
}
.msg-bubble.ai pre{
  background:rgba(26,34,51,.05);border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;margin:8px 0;overflow-x:auto;
}
.msg-bubble.ai pre code{background:none;padding:0;font-size:.82rem}
.msg-bubble.ai table{border-collapse:collapse;width:100%;margin:10px 0;font-size:.83rem}
.msg-bubble.ai th{
  background:rgba(31,58,95,.08);padding:7px 12px;text-align:left;
  border:1px solid var(--line);font-weight:600;color:var(--navy);
}
.msg-bubble.ai td{padding:6px 12px;border:1px solid var(--line)}
.msg-bubble.ai tr:nth-child(even) td{background:rgba(31,58,95,.025)}
.msg-bubble.ai blockquote{
  border-left:3px solid var(--teal);padding-left:12px;
  color:var(--muted);font-style:italic;margin:8px 0;
}
.msg-bubble.ai a{color:var(--teal-d);text-decoration:underline}
.msg-bubble.ai hr{border:none;border-top:1px solid var(--line);margin:10px 0}

/* Image attachment */
.msg-img{
  max-width:260px;border-radius:10px;display:block;
  margin-bottom:8px;border:1px solid rgba(255,255,255,.15);
}
.ai .msg-img{border-color:var(--line)}

/* Typing */
.typing-dots{display:flex;gap:4px;padding:4px 2px}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--teal);
  animation:bounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* Input area */
.input-area{
  padding:12px 20px 18px;
  background:rgba(247,245,240,.95);
  border-top:1px solid var(--line);
  flex-shrink:0;
}
.input-box{
  display:flex;gap:10px;align-items:flex-end;
  background:var(--input-bg);
  border:1.5px solid var(--line);border-radius:14px;
  padding:10px 10px 10px 16px;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 2px 8px rgba(26,34,51,.06);
}
.input-box:focus-within{
  border-color:rgba(46,196,182,.45);
  box-shadow:0 0 0 3px rgba(46,196,182,.08),0 2px 8px rgba(26,34,51,.06);
}
#chat-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);
  line-height:1.55;resize:none;max-height:130px;min-height:22px;
}
#chat-input::placeholder{color:rgba(107,122,141,.55)}
.input-actions{display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.btn-icon{
  width:34px;height:34px;border-radius:9px;
  background:transparent;border:1.5px solid var(--line);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .2s;
}
.btn-icon:hover{border-color:var(--teal);color:var(--teal-d)}
.btn-icon.has-file{border-color:var(--teal);color:var(--teal-d);background:rgba(46,196,182,.07)}
.btn-send{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--navy),#2d5a8e);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  box-shadow:0 4px 12px rgba(31,58,95,.25);
}
.btn-send:hover:not(:disabled){transform:scale(1.06);box-shadow:0 6px 16px rgba(31,58,95,.3)}
.btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-send svg{stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.input-hint{
  margin-top:8px;text-align:center;
  font-size:.68rem;color:rgba(107,122,141,.5);
}

/* Mobile overlay */
.sb-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9;
}

/* Mobile */
@media(max-width:700px){
  #sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:100;
    transform:translateX(-100%);
  }
  #sidebar.open{transform:translateX(0)}
  .sb-overlay.show{display:block}
  .btn-mobile-menu{display:flex}
  .msg-row{padding:4px 14px}
  .msg-bubble{max-width:90%}
}
</style>
</head>
<body>
<div style="background:linear-gradient(135deg,#1F3A5F,#4E7FB6);color:#fff;
  text-align:center;padding:9px 20px;font-size:13px;display:flex;
  align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;flex-shrink:0;
  position:relative;z-index:10">
  <span>💡 Đang dùng thử — lịch sử chat sẽ không được lưu</span>
  <a href="/login" style="background:#2EC4B6;color:#fff;padding:4px 14px;
    border-radius:100px;font-weight:600;font-size:12px;text-decoration:none;
    white-space:nowrap">Đăng nhập để lưu lịch sử →</a>
</div>

<!-- Sidebar overlay (mobile) -->
<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ── -->
<aside id="sidebar">
  <div class="sb-top">
    <div class="sb-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 8C19.85 8 10 17.85 10 30C10 42.15 19.85 52 32 52C44.15 52 54 42.15 54 30C54 17.85 44.15 8 32 8Z" stroke="white" stroke-width="3.2" opacity="0.92"/>
        <path d="M32 18L37.8 30L32 42L26.2 30L32 18Z" fill="#2EC4B6" stroke="white" stroke-width="2.4"/>
        <path d="M23 48L17 56L29 53.6L23 48Z" fill="white" opacity="0.92"/>
      </svg>
      Magerok
    </div>
  </div>

  <button class="btn-new" onclick="newChat()">
    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" fill="none">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    Cuộc trò chuyện mới
  </button>

  <div class="sb-section-label" id="history-label" style="display:none">Hôm nay</div>

  <div class="sb-list" id="conv-list">
    <!-- injected by JS -->
  </div>

  <div class="sb-footer">
    <div class="user-avatar" id="user-avatar">?</div>
    <div class="user-info">
      <div class="user-name" id="user-name">Đang tải...</div>
      <div class="user-email" id="user-email"></div>
    </div>
    <button class="btn-logout" onclick="logout()" title="Đăng xuất">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</aside>

<!-- ── MAIN ── -->
<main id="main">
  <!-- Topbar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-mobile-menu" onclick="openSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-model">
        <div class="topbar-dot"></div>
        <span>Magerok AI · Tư vấn tuyển sinh</span>
      </div>
    </div>
    <div class="topbar-right">
      <span style="font-size:.78rem;color:var(--muted)" id="topbar-user"></span>
    </div>
  </div>

  <!-- File indicator -->
  <div id="file-indicator">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
    <span id="file-name"></span>
    <button onclick="removeFile()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Messages -->
  <div id="messages">
    <!-- Empty state injected by JS -->
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="chat-input" rows="1"
        placeholder="Hỏi về điểm chuẩn, ngành học, định hướng..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <div class="input-actions">
        <button class="btn-icon" id="btn-upload" onclick="document.getElementById('file-input').click()" title="Đính kèm ảnh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)"/>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="input-hint">Enter gửi · Shift+Enter xuống dòng · hỗ trợ ảnh học bạ</div>
  </div>
</main>

<script>

function newChat() {
  activeId = null;

}

async function loadConv(id) {
  const conv = conversations.find(c=>c.id===id);
  if (!conv) return;
  activeId = id;
  currentHistoryId = id;   // set history_id khi load cuộc trò chuyện cũ
  renderSidebar();
  const box = document.getElementById('messages');
  box.innerHTML = '<div style="text-align:center;padding:40px;color:#999;font-size:13px">Đang tải...</div>';

  // Load messages từ Supabase nếu chưa load
  if (!conv.loaded && accessToken) {
    try {
      const res = await fetch(`/histories/${id}`, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      if (res.ok) {
        const msgs = await res.json();
        conv.messages = msgs.map(m => ({
          role: m.role === 'assistant' ? 'ai' : m.role,
          content: m.content,
          imgDataUrl: null
        }));
        conv.loaded = true;
      }
    } catch(_) {}
  }

  box.innerHTML = '';
  if (!conv.messages.length) {
    renderEmpty();
  } else {
    conv.messages.forEach(m => appendDOM(m.role, m.content, m.imgDataUrl, false));
    box.scrollTop = box.scrollHeight;
  }
  closeSidebar();
}

function deleteConv(e, id) {
  e.stopPropagation();
  conversations = conversations.filter(c=>c.id!==id);
  deleteHistoryRemote(id);   // xóa trên Supabase
  if (activeId === id) newChat();
  else renderSidebar();
}

/* ── File upload ─────────────────────────────────────────────────── */
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { alert('Ảnh tối đa 5MB'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const full = ev.target.result;
    pendingFile = { base64: full.split(',')[1], type: file.type, name: file.name, dataUrl: full };
    document.getElementById('file-indicator').classList.add('show');
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('btn-upload').classList.add('has-file');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function removeFile() {
  pendingFile = null;
  document.getElementById('file-indicator').classList.remove('show');
  document.getElementById('btn-upload').classList.remove('has-file');
}

/* ── Send ────────────────────────────────────────────────────────── */
function handleKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,130)+'px';
}

function now() {
  return new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
}

async function sendMessage() {
  if (isBusy) return;
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text && !pendingFile) return;

  // Remove empty state
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  // Create conv if new
  if (!activeId) {
    const id = 'c_'+Date.now();
    const title = text ? text.slice(0,48)+(text.length>48?'…':'') : '📎 Ảnh đính kèm';
    conversations.unshift({ id, title, messages:[], ts: Date.now() });
    activeId = id;
    renderSidebar();
  }
  const conv = conversations.find(c=>c.id===activeId);

  const msgText    = text || '(Xem ảnh đính kèm)';
  const fileSnap   = pendingFile ? {...pendingFile} : null;
  const imgDataUrl = fileSnap?.dataUrl || null;

  input.value=''; input.style.height='auto';
  removeFile();

  // Store & render user message
  conv.messages.push({ role:'user', content:msgText, imgDataUrl });
  appendDOM('user', msgText, imgDataUrl, true);

  // Typing
  const typId = 'typ_'+Date.now();
  appendTyping(typId);
  scrollBottom();

  isBusy = true;
  document.getElementById('btn-send').disabled = true;

  try {
    const headers = { 'Content-Type':'application/json' };
    // demo: không cần auth

    const res = await fetch('/demo/hoi', {
      method:'POST', headers,
      body: JSON.stringify({
        cau_hoi: msgText,
        image_base64: fileSnap?.base64 || null,
        image_type:   fileSnap?.type   || null,
      })
    });

    removeTyping(typId);

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.detail||`HTTP ${res.status}`);
    }

    const data = await res.json();
    const answer = data.tra_loi || '(Không có phản hồi)';

    // demo: không lưu history_id

    // Simulate streaming word by word
    const el = appendDOM('ai','',null,true);
    const bbl = el.querySelector('.md-content');
    let rendered = '';
    const words  = answer.split(' ');
    await new Promise(resolve => {
      let i=0;
      function step() {
        if (i>=words.length) { resolve(); return; }
        rendered += (i===0?'':' ') + words[i++];
        bbl.innerHTML = marked.parse(rendered);
        scrollBottom();
        setTimeout(step, 16);
      }
      step();
    });

    // Append timestamp
    const t = document.createElement('time');
    t.textContent = now();
    el.querySelector('.msg-bubble').appendChild(t);

    conv.messages.push({ role:'ai', content:answer });

  } catch(err) {
    removeTyping(typId);
    appendDOM('ai', `⚠️ Có lỗi xảy ra: ${err.message}`, null, true);
  } finally {
    isBusy = false;
    document.getElementById('btn-send').disabled = false;
  }
}

function appendDOM(role, content, imgDataUrl, animate) {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role==='user'?'user':''}`;
  if (!animate) row.style.animation='none';

  const initials = document.getElementById('user-avatar')?.textContent || 'HS';
  const avatarHtml = role==='user'
    ? `<div class="msg-avatar user">${initials}</div>`
    : `<div class="msg-avatar ai">
        <svg width="16" height="16" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 8C19.85 8 10 17.85 10 30C10 42.15 19.85 52 32 52C44.15 52 54 42.15 54 30C54 17.85 44.15 8 32 8Z" stroke="white" stroke-width="3.2" opacity="0.92"/>
          <path d="M32 18L37.8 30L32 42L26.2 30L32 18Z" fill="#2EC4B6" stroke="white" stroke-width="2.4"/>
          <path d="M23 48L17 56L29 53.6L23 48Z" fill="white" opacity="0.92"/>
        </svg>
      </div>`;

  let inner = '';
  if (imgDataUrl) inner += `<img src="${imgDataUrl}" class="msg-img" alt="ảnh"/>`;

  if (role === 'ai') {
    inner += `<div class="md-content">${content ? marked.parse(content) : ''}</div>`;
    if (content) inner += `<time>${now()}</time>`;
  } else {
    inner += `<div>${esc(content)}</div><time>${now()}</time>`;
  }

  row.innerHTML = avatarHtml + `<div class="msg-bubble ${role==='user'?'user':'ai'}">${inner}</div>`;
  box.appendChild(row);
  scrollBottom();
  return row;
}

        <path d="M32 8C19.85 8 10 17.85 10 30C10 42.15 19.85 52 32 52C44.15 52 54 42.15 54 30C54 17.85 44.15 8 32 8Z" stroke="white" stroke-width="3.2" opacity="0.92"/>
        <path d="M32 18L37.8 30L32 42L26.2 30L32 18Z" fill="#2EC4B6" stroke="white" stroke-width="2.4"/>
        <path d="M23 48L17 56L29 53.6L23 48Z" fill="white" opacity="0.92"/>
      </svg>

    <div class="msg-bubble ai"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;

}
function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function scrollBottom() {
  const b = document.getElementById('messages');
  b.scrollTop = b.scrollHeight;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
